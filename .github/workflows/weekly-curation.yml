name: Weekly AI resource curation

on:
  schedule:
    - cron: "0 7 * * 1"
  workflow_dispatch:

concurrency:
  group: weekly-ai-resource-curation
  cancel-in-progress: false

permissions: {}

jobs:
  curate:
    runs-on: ubuntu-latest
    timeout-minutes: 50
    permissions:
      contents: read
      pull-requests: read
    outputs:
      has_patch: ${{ steps.patch.outputs.has_patch }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: master
          fetch-depth: 20
          persist-credentials: false
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
      - name: Skip while the weekly pull request is open
        id: open-pr
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          number="$(gh pr list --head codex/weekly-curation --base master --state open --json number --jq '.[0].number // empty')"
          if [ -n "$number" ]; then
            echo "Weekly curation PR #$number is still open. Skipping this run."
            echo "exists=true" >> "$GITHUB_OUTPUT"
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
          fi
      - name: Run preflight checks
        if: steps.open-pr.outputs.exists != 'true'
        run: |
          python -m unittest discover -s tests -v
          python scripts/validate_readme.py README.md
      - name: Research and propose curation changes
        if: steps.open-pr.outputs.exists != 'true'
        uses: openai/codex-action@52fe01ec70a42f454c9d2ebd47598f9fd6893d56
        with:
          openai-api-key: ${{ secrets.OPENAI_API_KEY }}
          prompt-file: .github/codex/prompts/weekly-curation.md
          output-file: curation-report.md
          sandbox: workspace-write
          codex-args: '["--search", "--ephemeral", "--ignore-user-config"]'
          effort: high
          safety-strategy: drop-sudo
          allow-bots: true
      - name: Validate proposal
        if: steps.open-pr.outputs.exists != 'true'
        run: |
          python -m unittest discover -s tests -v
          python scripts/validate_readme.py README.md --check-links --base HEAD
          unexpected="$(git status --porcelain --untracked-files=all | grep -v -e '^ M README.md$' -e '^?? curation-report.md$' || true)"
          if [ -n "$unexpected" ]; then
            echo "Curator made unexpected workspace changes:"
            echo "$unexpected"
            exit 1
          fi
      - name: Create patch artifact
        if: steps.open-pr.outputs.exists != 'true'
        id: patch
        run: |
          git diff --binary -- README.md > codex.patch
          if [ -s codex.patch ]; then
            echo "has_patch=true" >> "$GITHUB_OUTPUT"
          else
            echo "has_patch=false" >> "$GITHUB_OUTPUT"
          fi
      - name: Upload proposal
        if: steps.patch.outputs.has_patch == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: curation-proposal
          path: |
            codex.patch
            curation-report.md
          if-no-files-found: error
          retention-days: 14

  review:
    needs: curate
    if: needs.curate.outputs.has_patch == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 50
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
        with:
          ref: master
          fetch-depth: 20
          persist-credentials: false
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
      - uses: actions/download-artifact@v4
        with:
          name: curation-proposal
          path: proposal
      - name: Apply proposed patch
        run: git apply proposal/codex.patch
      - name: Independently review proposal
        uses: openai/codex-action@52fe01ec70a42f454c9d2ebd47598f9fd6893d56
        with:
          openai-api-key: ${{ secrets.OPENAI_API_KEY }}
          prompt-file: .github/codex/prompts/review-curation.md
          output-file: curation-review.json
          output-schema-file: .github/codex/schemas/curation-review.schema.json
          sandbox: read-only
          codex-args: '["--search", "--ephemeral", "--ignore-user-config"]'
          effort: high
          safety-strategy: drop-sudo
          allow-bots: true
      - name: Enforce reviewer decision
        run: |
          python -m unittest discover -s tests -v
          python scripts/validate_readme.py README.md --check-links
          jq -e '
            .approved == true and
            ([.findings[] | select(.severity == "blocker" or .severity == "important")] | length == 0)
          ' curation-review.json
      - name: Upload approved proposal
        uses: actions/upload-artifact@v4
        with:
          name: approved-curation
          path: |
            proposal/codex.patch
            proposal/curation-report.md
            curation-review.json
          if-no-files-found: error
          retention-days: 14

  open-pr:
    needs: review
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: write
      pull-requests: write
    env:
      GH_TOKEN: ${{ github.token }}
      BRANCH: codex/weekly-curation
    steps:
      - uses: actions/checkout@v4
        with:
          ref: master
          fetch-depth: 0
      - uses: actions/download-artifact@v4
        with:
          name: approved-curation
          path: approved
      - name: Commit approved patch
        run: |
          git apply --index approved/proposal/codex.patch
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git switch -c "$BRANCH"
          git commit -m "docs: weekly AI resource curation"
      - name: Push reserved automation branch
        run: |
          git fetch origin "refs/heads/$BRANCH:refs/remotes/origin/$BRANCH" || true
          git push --force-with-lease origin "HEAD:$BRANCH"
      - name: Create or update pull request
        run: |
          {
            echo "## Weekly curation report"
            echo
            cat approved/proposal/curation-report.md
            echo
            echo "## Independent review"
            echo
            jq -r '.summary' approved/curation-review.json
            echo
            echo "This pull request was proposed by the weekly curation workflow and requires human review."
          } > pr-body.md
          number="$(gh pr list --head "$BRANCH" --base master --state open --json number --jq '.[0].number // empty')"
          if [ -n "$number" ]; then
            gh pr edit "$number" --title "docs: weekly AI resource curation" --body-file pr-body.md
          else
            gh pr create \
              --base master \
              --head "$BRANCH" \
              --title "docs: weekly AI resource curation" \
              --body-file pr-body.md
          fi
